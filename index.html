<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Pemuda Muhammadiyah Cikoneng</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: 'Source Sans 3', sans-serif;
    background: linear-gradient(-45deg, #004e92, #00c6ff, #007a3d, #00b894);
    background-size: 300% 300%;
    animation: gradientMove 20s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    padding: 110px 20px;
    opacity: 0;
    transform: translateY(15px);
    animation: fadeSmooth 1.5s ease forwards;
}

@keyframes fadeSmooth {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.title {
    font-size: 27px;
    font-weight: 700;
    margin-bottom: 18px;
    min-height: 38px;
}

.cursor {
    display: inline-block;
    width: 2px;
    height: 22px;
    background: white;
    margin-left: 4px;
    animation: blink 0.8s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

.description {
    font-size: 14px;
    max-width: 520px;
    margin: auto;
    line-height: 1.7;
    opacity: 0.95;
}

.follow-text {
    margin-top: 22px;
    font-size: 13px;
    font-weight: 600;
}

.social-icons {
    margin-top: 18px;
}

.social-icons a {
    color: white;
    font-size: 24px;
    margin: 0 12px;
    text-decoration: none;
    display: inline-block;
    transition: 0.3s ease;
}

/* Animasi Bounce */
@keyframes bounce {
    0%   { transform: scale(1) translateY(0); }
    30%  { transform: scale(1.15) translateY(-6px); }
    50%  { transform: scale(0.95) translateY(0); }
    70%  { transform: scale(1.05) translateY(-3px); }
    100% { transform: scale(1) translateY(0); }
}

/* Saat hover */
.social-icons a:hover {
    animation: bounce 0.5s ease;
}

/* Saat ditekan (mobile) */
.social-icons a:active {
    transform: scale(0.9);
}

/* Warna Brand Hover */
.social-icons a.instagram:hover {
    background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.social-icons a.tiktok:hover {
    color: #25F4EE;
}

.social-icons a.facebook:hover {
    color: #1877F2;
}

.social-icons a.youtube:hover {
    color: #FF0000;
}

footer {
    margin-top: 45px;
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">
        <span id="typedText"></span><span class="cursor"></span>
    </div>

    <div class="description">
        Organisasi kepemudaan Islam yang aktif 
        dalam dakwah dan kegiatan sosial 
        untuk membangun generasi berkemajuan.
    </div>

    <div class="follow-text">
        Ikuti dan dukung aktivitas kami melalui media sosial
    </div>

    <div class="social-icons">
        <a href="https://www.instagram.com/pcpmcikoneng" target="_blank" class="instagram">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="https://www.tiktok.com/@pcpmcikoneng" target="_blank" class="tiktok">
            <i class="fab fa-tiktok"></i>
        </a>

        <a href="https://www.facebook.com/profile.php?id=61588376506886" target="_blank" class="facebook">
            <i class="fab fa-facebook"></i>
        </a>

        <a href="https://youtube.com/@pcpmcikoneng?si=_Dfkgj0HH9mCAE6b" target="_blank" class="youtube">
            <i class="fab fa-youtube"></i>
        </a>
    </div>

    <footer>
        © 2026 PC Pemuda Muhammadiyah Cikoneng
    </footer>

</div>

<audio id="typingSound" src="https://www.soundjay.com/mechanical/sounds/keyboard-1.mp3" preload="auto"></audio>

<script>
const text = "PC Pemuda Muhammadiyah Cikoneng";
const typedText = document.getElementById("typedText");
const sound = document.getElementById("typingSound");

let index = 0;

function typeLetter() {
    if (index < text.length) {
        typedText.innerHTML += text.charAt(index);
        sound.currentTime = 0;
        sound.play().catch(()=>{});
        index++;
        setTimeout(typeLetter, 65);
    }
}

setTimeout(typeLetter, 700);
</script>

</body>
</html>
